# Netlify Configuration File
# Configures the build settings, serverless functions directory, 
# redirects, and global security response headers.

[build]
  # Build command to automatically generate the dist folder during deploy
  command = "mkdir -p dist && cp index.html robots.txt sitemap.xml googleef478a5a18c50b12.html _headers _redirects dist/ && cp -r netlify dist/"
  # Publish directory is the dist folder for clean deployment
  publish = "dist"
  # Location of the Netlify serverless functions
  functions = "netlify/functions"

# Proxy redirect for clean API calls in frontend JS
[[redirects]]
  from = "/api/get-links"
  to = "/.netlify/functions/get-links"
  status = 200

[[redirects]]
  from = "/api/referrals"
  to = "/.netlify/functions/referrals"
  status = 200

# Global security headers for the landing page
[[headers]]
  for = "/*"
    [headers.values]
      X-Frame-Options = "DENY"
      X-Content-Type-Options = "nosniff"
      X-XSS-Protection = "1; mode=block"
      Referrer-Policy = "strict-origin-when-cross-origin"
      # Secure policies while allowing Google Fonts, Tailwind Play CDN, and canvas-confetti script
      Content-Security-Policy = "default-src 'self' https: 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https: img.icons8.com; connect-src 'self' https:;"
